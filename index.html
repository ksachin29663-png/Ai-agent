<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Sachin's AI Engine</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 15px; border-radius: 12px; max-width: 85%; line-height: 1.4; font-size: 18px; }
        .user { background: #0056b3; align-self: flex-end; color: #fff; }
        .engine { background: #1a1a1a; align-self: flex-start; border: 1px solid #333; }
        .controls { padding: 15px; background: #111; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; padding: 15px; border-radius: 8px; border: 1px solid #444; background: #000; color: #fff; font-size: 16px; }
        button { padding: 10px 20px; background: #28a745; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chat-box"></div>
    <div class="controls">
        <input type="text" id="userInput" placeholder="पूछें, सिखाएं या 'google: सवाल'...">
        <button onclick="startVoice()">🎙️</button>
        <button onclick="askEngine()">भेजें</button>
    </div>

    <script>
        // 1. मेमोरी सिस्टम
        let brain = JSON.parse(localStorage.getItem('masterBrain')) || {
            "hi": "नमस्ते सचिन! मैं तैयार हूँ।",
            "क्रांति": "क्रांति मतलब पुराने को बदलकर नया निर्माण।"
        };

        // 2. इंजन का लॉजिक
        function askEngine() {
            let inputField = document.getElementById("userInput");
            let input = inputField.value;
            let cb = document.getElementById("chat-box");
            if (!input.trim()) return;
            
            cb.innerHTML += `<div class="msg user">${input}</div>`;
            let low = input.toLowerCase().trim();
            
            if (low.startsWith("learn:")) {
                let p = input.split(":");
                brain[p[1].trim().toLowerCase()] = p[2].trim();
                localStorage.setItem('masterBrain', JSON.stringify(brain));
                cb.innerHTML += `<div class="msg engine">सीख लिया! यह हमेशा याद रहेगा।</div>`;
            } else if (low.startsWith("google:")) {
                window.open(`https://www.google.com/search?q=${low.split(':')[1]}`);
            } else if (brain[low]) {
                cb.innerHTML += `<div class="msg engine">${brain[low]}</div>`;
            } else {
                cb.innerHTML += `<div class="msg engine">मुझे नहीं पता। सिखाने के लिए 'learn: कीवर्ड: जवाब' लिखें।</div>`;
            }
            inputField.value = "";
            cb.scrollTop = cb.scrollHeight;
        }

        // 3. वॉयस सिस्टम
        function startVoice() {
            let rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = 'hi-IN';
            rec.start();
            rec.onresult = (e) => {
                document.getElementById("userInput").value = e.results[0][0].transcript;
                askEngine();
            };
        }
    </script>
</body>
</html>
