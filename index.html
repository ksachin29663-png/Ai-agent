<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Sachin's Pro Engine</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; padding: 15px; }
        #chat-box { height: 70vh; overflow-y: auto; margin-bottom: 10px; }
        .msg { padding: 10px; margin: 5px; border-radius: 10px; }
        .user { background: #007bff; text-align: right; }
        .engine { background: #333; }
    </style>
</head>
<body>
    <div id="chat-box"></div>
    <input type="text" id="userInput" style="width:70%; padding:10px;">
    <button onclick="askEngine()">भेजें</button>

    <script>
        // यह रहा तुम्हारा पूरा ज्ञान का भंडार (इसे कोड के अंदर ही रहने दो)
        const knowledge = {
            "hi": "नमस्ते सचिन! मैं तुम्हारा अपना एआई असिस्टेंट हूँ। बताओ, आज कौन सा प्रोजेक्ट शुरू करें?",
            "flutter": "Flutter गूगल का फ्रेमवर्क है। इसमें हम Dart भाषा इस्तेमाल करते हैं। यह 'Everything is a Widget' के सिद्धांत पर काम करता है।",
            "node": "Node.js जावास्क्रिप्ट को सर्वर पर चलाने का काम करता है। यह बहुत तेज़ है और 'npm' इसका पैकेज मैनेजर है।",
            "coding": "कोडिंग का मतलब है लॉजिक बनाना। हमेशा छोटे हिस्सों में समस्या को हल करो।",
            "सचिन": "सचिन एक बहुत ही होनहार डेवलपर है जो बिना किसी API के अपना खुद का एआई इंजन बना रहा है!",
            "कैसे हो": "मैं बिल्कुल ठीक हूँ, बस तुम्हारे कोड का इंतज़ार कर रहा हूँ!"
        };

        function askEngine() {
            let input = document.getElementById("userInput").value.toLowerCase().trim();
            let chatBox = document.getElementById("chat-box");
            if (!input) return;

            chatBox.innerHTML += `<div class="msg user">${input}</div>`;
            
            // यह चेक करेगा कि क्या इनपुट हमारे knowledge में है
            let response = knowledge[input] || "मुझे नहीं पता, लेकिन तुम मुझे सिखा सकते हो 'learn: कीवर्ड: उत्तर' लिखकर।";

            chatBox.innerHTML += `<div class="msg engine">${response}</div>`;
            document.getElementById("userInput").value = "";
        }
    </script>
</body>
</html>
