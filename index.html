<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sachin's Revolutionary AI</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #eee; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 18px; border-radius: 15px; max-width: 80%; line-height: 1.5; }
        .user { background: #0056b3; align-self: flex-end; }
        .engine { background: #222; align-self: flex-start; border: 1px solid #444; }
        .controls { padding: 15px; background: #1a1a1a; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #000; color: #fff; }
        button { padding: 10px 20px; background: #0056b3; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="chat-box"></div>
    <div class="controls">
        <input type="text" id="userInput" placeholder="कुछ पूछें या 'Google: सवाल'...">
        <button onclick="startVoice()">🎙️</button>
        <button onclick="askEngine()">भेजें</button>
    </div>

    <script>
        // पहले से लोड किया हुआ सारा ज्ञान (इसमें 50,000+ शब्द जोड़ सकते हो)
        let brain = JSON.parse(localStorage.getItem('sachinMasterBrain')) || {
            "hi": "नमस्ते सचिन! मैं तुम्हारा अपना क्रांतिकारी एआई हूँ। आज हम कोडिंग में क्या धमाका करेंगे?",
            "flutter": "Flutter गूगल का यूआई किट है, जिससे हम एंड्रॉइड और आईओएस के लिए शानदार ऐप्स बनाते हैं।",
            "node": "Node.js सर्वर-साइड डेवलपमेंट के लिए है, यह जावास्क्रिप्ट को सर्वर पर चलाने की शक्ति देता है।",
            "क्रांति": "क्रांति का मतलब है पुरानी सोच और गलत सिस्टम को बदलकर नया निर्माण करना।",
            "इंसान": "इंसान भावनाओं और तर्क के मेल से बना है, उसे सम्मान और आजादी की भूख हमेशा रहती है।",
            "कोडिंग": "कोडिंग सिर्फ कंप्यूटर की भाषा नहीं, यह विचार को हकीकत में बदलने का सबसे ताकतवर हथियार है।",
            "सफलता": "सफलता का अर्थ है अपने सिद्धांतों पर अडिग रहकर समस्याओं को सुलझाते रहने का सफर।",
            "डर": "डर इंसान की सबसे बड़ी रुकावट है, इसे जीतना ही विकास की पहली सीढ़ी है।",
            "सचिन": "सचिन एक जुनूनी डेवलपर है जो बिना किसी बाहरी मदद के अपना खुद का एआई सिस्टम तैयार कर रहा है।",
            "google": "अगर मुझे कुछ न पता हो, तो मैं गूगल सर्च का लिंक दे सकता हूँ। बस 'Google: सवाल' पूछो।"
        };

        function askEngine() {
            let inputField = document.getElementById("userInput");
            let input = inputField.value;
            let chatBox = document.getElementById("chat-box");
            if (!input.trim()) return;

            chatBox.innerHTML += `<div class="msg user">${input}</div>`;
            let lower = input.toLowerCase().trim();

            if (lower.startsWith("google:")) {
                let query = input.split(":")[1];
                let url = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
                chatBox.innerHTML += `<div class="msg engine">मैंने गूगल पर ढूँढा: <a href="${url}" target="_blank" style="color:#00aaff;">यहाँ क्लिक करें</a></div>`;
            } else if (brain[lower]) {
                chatBox.innerHTML += `<div class="msg engine">${brain[lower]}</div>`;
            } else {
                chatBox.innerHTML += `<div class="msg engine">मुझे यह नहीं पता। सिखाने के लिए 'learn: कीवर्ड: जवाब' लिखें।</div>`;
            }

            inputField.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function startVoice() {
            let rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = 'hi-IN';
            rec.start();
            rec.onresult = (e) => {
                document.getElementById("userInput").value = e.results[0][0].transcript;
                askEngine();
            };
        }
    </script>
</body>
</html>
